name: Build & Deploy Release Branch

on:
  push:
    branches:
      - master
      - develop

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache local Maven repository
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Configure GPG Key
        run: echo -n "$GPG_SIGNING_KEY" | base64 --decode | gpg --import
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}

      - name: Build with Maven
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            mvn --batch-mode --update-snapshots verify -P release -Dchangelist=
          else
            mvn --batch-mode --update-snapshots verify -P release -Dchangelist=-SNAPSHOT
          fi

      - name: Deploy
        run: |
          if [[ "${{ github.ref_name }}" == "master" ]]; then
            mvn --batch-mode -s settings.xml clean deploy -P release -Dchangelist=
          else
            mvn --batch-mode -s settings.xml clean deploy -P release -Dchangelist=-SNAPSHOT
          fi
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}